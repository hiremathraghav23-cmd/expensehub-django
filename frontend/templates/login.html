{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            Login
        </h1>

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   class="form-control">

            <input type="password"
                   name="password"
                   placeholder="Password"
                   class="form-control">

            <button type="submit"
                    class="custom-btn w-100">

                Login

            </button>

        </form>

        <p class="mt-3">

            Don't have account?

            <a href="/register/">
                Register
            </a>

        </p>

    </div>

</div>

</body>
</html>
