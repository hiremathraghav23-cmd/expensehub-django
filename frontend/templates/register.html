{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>
            Register
        </h1>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="custom-btn w-100">

                Register

            </button>

        </form>

        <p class="mt-3">

            Already have account?

            <a href="/login/">
                Login
            </a>

        </p>

    </div>

</div>

</body>
</html>
